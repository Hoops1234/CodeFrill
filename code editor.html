<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Code Editor</title>
  <style>
    /* Stack Layout for Mobile Views */
    .stacklayout {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Mobile Media Queries */
    @media screen and (max-width: 768px) {
      .stacklayout {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .editor-container {
        display: flex;
        flex-direction: column;
      }

      .editor {
        padding: 8px;
      }

      .editor textarea {
        font-size: 12px;
        padding: 8px;
      }

      iframe {
        height: 300px;
      }
    }

    @media screen and (max-width: 480px) {
      .stacklayout {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      h1 {
        font-size: 18px;
        padding: 8px;
      }

      .editor-container {
        display: flex;
        flex-direction: column;
      }

      .editor {
        padding: 5px;
      }

      .editor textarea {
        font-size: 11px;
        padding: 5px;
        min-height: 150px;
      }

      iframe {
        height: 250px;
      }

      button {
        padding: 8px 16px;
        font-size: 14px;
      }
    }

    @media screen and (max-width: 375px) {
      h1 {
        font-size: 16px;
      }

      .editor textarea {
        font-size: 10px;
        min-height: 120px;
      }

      iframe {
        height: 200px;
      }

      button {
        padding: 6px 12px;
        font-size: 12px;
      }
    }

    @media screen and (max-width: 320px) {
      .editor textarea {
        font-size: 9px;
        min-height: 100px;
      }

      iframe {
        height: 180px;
      }
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
    }

    h1 {
      text-align: center;
      background: #282c34;
      color: white;
      margin: 0;
      padding: 10px;
    }

    .editor-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      background: #1e1e1e;
      color: #dcdcdc;
    }

    .editor textarea {
      flex: 1;
      margin-bottom: 10px;
      background: #1e1e1e;
      color: #dcdcdc;
      border: 1px solid #333;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      resize: none;
    }

    iframe {
      flex: 1;
      border: none;
    }

    .label {
      color: #61dafb;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
   <div style="padding: 10px; background: #282c34; text-align: left;">
     <button onclick="window.location.href='index.html'" style="background: #282c34; color: white; border: none; padding: 5px 10px; cursor: pointer; font-size: 18px;">←</button>
   </div>
   <h1>🧪 Code Editor</h1>
  <div class="editor-container">
    <div class="editor">
      <div class="label">HTML</div>
      <textarea id="html" oninput="updatePreview()">
<h1>Hello, world!</h1>
<p>This is a live preview editor.</p>
      </textarea>

      <div class="label">CSS</div>
      <textarea id="css" oninput="updatePreview()">
body {
  font-family: sans-serif;
  background: #f0f0f0;
  padding: 20px;
}
h1 {
  color: #007acc;
}
      </textarea>

      <div class="label">JavaScript</div>
      <textarea id="js" oninput="updatePreview()">

      </textarea>
    </div>

    <iframe id="preview"></iframe>
  </div>

  <script>
    function updatePreview() {
      const html = document.getElementById("html").value;
      const css = document.getElementById("css").value;
      const js = document.getElementById("js").value;

      const previewFrame = document.getElementById("preview");
      const preview = previewFrame.contentDocument || previewFrame.contentWindow.document;
      preview.open();
      preview.write(`
        <html>
          <head><style>${css}</style></head>
          <body>
            ${html}
            <script>${js}<\/script>
          </body>
        </html>
      `);
      preview.close();
    }

    window.onload = updatePreview;
  </script>
</body>
</html>
